name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Validate Supabase secrets are present
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_ANON_KEY is not set. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets appear set (value masked)."

      - name: Ping Supabase REST API
        run: |
          # remove trailing slash from SUPABASE_URL if present
          URL="${SUPABASE_URL%/}"
          curl -sS -i --fail -X GET "${URL}/rest/v1/profiles?limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
